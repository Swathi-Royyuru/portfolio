<div class="sign-in-container">
  <mat-card class="sign-in-card">
    <mat-card-header>
      <mat-card-title>Welcome Back</mat-card-title>
      <mat-card-subtitle>Sign in to order now!</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">

        <!-- Email -->
        <div class="form-field-container">
          <label class="form-label">Email</label>
          <mat-form-field appearance="outline">
            <input matInput formControlName="email" placeholder="Enter email*" required>
            <mat-icon matSuffix>email</mat-icon>
            <mat-error *ngIf="email?.errors?.['required']">Email is required</mat-error>
            <mat-error *ngIf="email?.errors?.['email']">Invalid email</mat-error>
          </mat-form-field>
        </div>

        <!-- Password -->
        <div class="form-field-container">
          <label class="form-label">Password</label>
          <mat-form-field appearance="outline">
            <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter password*" required>
            <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
              <mat-icon>{{showPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="password?.errors?.['required']">Password is required</mat-error>
          </mat-form-field>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="form-error-message">
          <mat-icon>error</mat-icon>
          <span>{{errorMessage}}</span>
        </div>

        <!-- Submit Button -->
        <button mat-raised-button color="primary" type="submit" [disabled]="signInForm.invalid || isLoading" class="submit-button">
          <span *ngIf="!isLoading">Sign In</span>
          <mat-spinner *ngIf="isLoading" diameter="24" class="spinner"></mat-spinner>
        </button>

        <div class="login-prompt">
          Don't have an account? <a href="/signup" class="login-link">Sign Up</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
