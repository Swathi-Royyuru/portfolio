<div class="main-container">
  <div class="filter-section">
  <mat-form-field>
    <mat-label>Cuisine</mat-label>
    <mat-select [(value)]="selectedCuisine" (selectionChange)="applyFilters()">
      <mat-option value="all">All Cuisines</mat-option>
      <mat-option *ngFor="let cuisine of availableCuisines" [value]="cuisine">
        {{cuisine}}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Minimum Rating</mat-label>
    <mat-select [(value)]="selectedRating" (selectionChange)="applyFilters()">
      <mat-option value="0">Any Rating</mat-option>
      <mat-option value="3">3+ Stars</mat-option>
      <mat-option value="4">4+ Stars</mat-option>
      <mat-option value="4.5">4.5+ Stars</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<div class="restaurants-container">
<mat-grid-list cols="4" rowHeight="1:1" gutterSize="16px">
  <mat-grid-tile *ngFor="let restaurant of filteredRestaurants">
    <mat-card class="restaurant-card" (click)="viewRestaurant(restaurant.id)">
      <img mat-card-image [src]="restaurant.photo" [alt]="restaurant.name">
      <mat-card-content>
        <h3>{{restaurant.name}}</h3>
        <div class="rating">
          <span *ngFor="let star of [].constructor(getStars(restaurant.rating).full)">
            <mat-icon>star</mat-icon>
          </span>
          <span *ngIf="getStars(restaurant.rating).half">
            <mat-icon>star_half</mat-icon>
          </span>
          <span>({{restaurant.rating}})</span>
        </div>
        <p class="cuisine info">{{restaurant.cuisine}} • {{restaurant.deliveryTime}}</p>
      </mat-card-content>
    </mat-card>
  </mat-grid-tile>
</mat-grid-list>

<div *ngIf="filteredRestaurants.length === 0" class="no-results">
  <mat-icon>search_off</mat-icon>
  <p>No restaurants found matching your filters</p>
</div>
</div>
</div>
